<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Messages | TrabaHanap</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="min-h-screen flex flex-col md:flex-row bg-slate-50">

    <aside class="w-full md:w-64 bg-white border-r border-slate-100 p-6 flex flex-col shrink-0" style="height:100vh;position:sticky;top:0;overflow-y:auto">
        <div class="flex items-center gap-2 mb-10">
            <div class="w-8 h-8 bg-indigo-600 rounded-xl flex items-center justify-center shadow-md"><span class="text-white font-black text-xs">T</span></div>
            <div>
                <span class="font-bold text-base tracking-tight block leading-tight">TrabaHanap</span>
                <span style="font-size:9px;color:#94a3b8;font-weight:600">Online Job Application System</span>
            </div>
        </div>
        <nav class="space-y-1 flex-1">
            <a href="/dashboard" class="nav-link w-full flex items-center gap-3 px-4 py-3 rounded-2xl text-slate-400 transition"><span>🏠</span><span class="text-sm">Find Jobs</span></a>
            <a href="/saved" class="nav-link w-full flex items-center gap-3 px-4 py-3 rounded-2xl text-slate-400 transition"><span>🔖</span><span class="text-sm">Saved Jobs</span></a>
            <a href="/applications" class="nav-link w-full flex items-center gap-3 px-4 py-3 rounded-2xl text-slate-400 transition"><span>📂</span><span class="text-sm">Applications</span></a>
            <a href="/messages" class="nav-link active w-full flex items-center gap-3 px-4 py-3 rounded-2xl text-slate-400 transition"><span>💬</span><span class="text-sm">Messages</span></a>
            <a href="/profile" class="nav-link w-full flex items-center gap-3 px-4 py-3 rounded-2xl text-slate-400 transition"><span>👤</span><span class="text-sm">Profile</span></a>
        </nav>
        <button onclick="logout()" class="mt-6 text-slate-400 hover:text-red-500 font-medium px-4 py-3 text-left transition text-sm">Log out</button>
    </aside>

    <main class="flex-1 flex overflow-hidden" style="height:100vh">
        <!-- Conversation list -->
        <div class="w-80 bg-white border-r border-slate-100 flex flex-col shrink-0">
            <div class="p-5 border-b border-slate-100">
                <h1 class="text-lg font-bold text-slate-900">Messages</h1>
                <p class="text-xs text-slate-400 mt-0.5">Your conversations</p>
            </div>
            <div id="conversation-list" class="flex-1 overflow-y-auto p-3 space-y-1">
                <p class="text-slate-400 text-sm text-center py-8">Loading...</p>
            </div>
            <!-- New message -->
            <div class="p-4 border-t border-slate-100">
                <button onclick="openNewMsg()" class="btn btn-primary w-full h-10 text-sm">+ New Message</button>
            </div>
        </div>

        <!-- Chat area -->
        <div class="flex-1 flex flex-col">
            <div id="chat-header" class="p-5 border-b border-slate-100 bg-white hidden">
                <h2 id="chat-name" class="font-bold text-slate-900"></h2>
                <p id="chat-username" class="text-xs text-slate-400"></p>
            </div>
            <div id="chat-empty" class="flex-1 flex items-center justify-center text-slate-400">
                <div class="text-center">
                    <div class="text-5xl mb-3">💬</div>
                    <p class="font-semibold text-slate-600">Select a conversation</p>
                    <p class="text-sm mt-1">or start a new one</p>
                </div>
            </div>
            <div id="chat-messages" class="flex-1 overflow-y-auto p-6 space-y-3 hidden"></div>
            <div id="chat-input" class="p-4 border-t border-slate-100 bg-white hidden">
                <div class="flex gap-3">
                    <input type="text" id="msg-input" placeholder="Type a message..." class="input flex-1" onkeydown="if(event.key==='Enter') sendMessage()">
                    <button onclick="sendMessage()" class="btn btn-primary h-11 px-5">Send</button>
                </div>
            </div>
        </div>
    </main>

    <!-- New Message Modal -->
    <div id="newMsgModal" class="modal p-4">
        <div class="modal-box bg-white w-full max-w-md rounded-[2rem] shadow-2xl p-8">
            <h3 class="text-lg font-bold mb-5">New Message</h3>
            <div class="space-y-4">
                <div>
                    <label class="text-xs font-bold text-slate-500 uppercase">To (Username)</label>
                    <input type="text" id="new-receiver" placeholder="Enter username" class="input mt-1">
                </div>
                <div>
                    <label class="text-xs font-bold text-slate-500 uppercase">Subject</label>
                    <input type="text" id="new-subject" placeholder="e.g. Regarding your application" class="input mt-1">
                </div>
                <div>
                    <label class="text-xs font-bold text-slate-500 uppercase">Message</label>
                    <textarea id="new-content" rows="4" placeholder="Write your message..." class="input mt-1 resize-none"></textarea>
                </div>
                <div class="flex gap-3 pt-2">
                    <button onclick="closeNewMsg()" class="btn btn-secondary flex-1 h-11">Cancel</button>
                    <button onclick="sendNewMessage()" class="btn btn-primary flex-1 h-11">Send</button>
                </div>
            </div>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script>
        if (!localStorage.getItem('jc_token')) window.location.href = '/login';
        const me = JSON.parse(localStorage.getItem('jc_user') || '{}');
        let currentConvo = null;

        async function loadConversations() {
            const msgs = await apiGet('/messages/inbox');
            const list = document.getElementById('conversation-list');
            if (!msgs.length) {
                list.innerHTML = '<p class="text-slate-400 text-sm text-center py-8">No messages yet.</p>';
                return;
            }
            // Group by other person
            const seen = new Set();
            const convos = [];
            msgs.forEach(m => {
                const other = m.isMine ? m.receiverUsername : m.senderUsername;
                const otherName = m.isMine ? m.receiverUsername : m.senderName;
                if (!seen.has(other)) { seen.add(other); convos.push({ username: other, name: otherName, last: m }); }
            });
            list.innerHTML = convos.map(c => `
                <div onclick="openConvo('${c.username}', '${c.name}')" class="flex items-center gap-3 p-3 rounded-2xl hover:bg-slate-50 cursor-pointer transition ${currentConvo === c.username ? 'bg-indigo-50' : ''}">
                    <div class="w-10 h-10 bg-gradient-to-br from-indigo-500 to-teal-400 rounded-full flex items-center justify-center text-white font-bold text-sm shrink-0">${c.name[0].toUpperCase()}</div>
                    <div class="flex-1 min-w-0">
                        <p class="text-sm font-semibold text-slate-800 truncate">${c.name}</p>
                        <p class="text-xs text-slate-400 truncate">${c.last.content}</p>
                    </div>
                    ${!c.last.isRead && !c.last.isMine ? '<span class="w-2 h-2 bg-indigo-500 rounded-full shrink-0"></span>' : ''}
                </div>`).join('');
        }

        async function openConvo(username, name) {
            currentConvo = username;
            document.getElementById('chat-empty').classList.add('hidden');
            document.getElementById('chat-messages').classList.remove('hidden');
            document.getElementById('chat-input').classList.remove('hidden');
            document.getElementById('chat-header').classList.remove('hidden');
            document.getElementById('chat-name').innerText = name;
            document.getElementById('chat-username').innerText = '@' + username;

            const msgs = await apiGet('/messages/conversation/' + username);
            const container = document.getElementById('chat-messages');
            container.innerHTML = msgs.map(m => `
                <div class="flex ${m.isMine ? 'justify-end' : 'justify-start'}">
                    <div class="max-w-xs lg:max-w-md px-4 py-3 rounded-2xl text-sm ${m.isMine ? 'bg-indigo-600 text-white rounded-br-sm' : 'bg-white border border-slate-100 text-slate-800 rounded-bl-sm shadow-sm'}">
                        <p>${m.content}</p>
                        <p class="text-[10px] mt-1 ${m.isMine ? 'text-indigo-200' : 'text-slate-400'}">${timeAgo(m.sentAt)}</p>
                    </div>
                </div>`).join('');
            container.scrollTop = container.scrollHeight;
            loadConversations();
        }

        async function sendMessage() {
            const content = document.getElementById('msg-input').value.trim();
            if (!content || !currentConvo) return;
            await apiPost('/messages', { receiverUsername: currentConvo, content }, true);
            document.getElementById('msg-input').value = '';
            openConvo(currentConvo, document.getElementById('chat-name').innerText);
        }

        function openNewMsg() { document.getElementById('newMsgModal').classList.add('active'); }
        function closeNewMsg() { document.getElementById('newMsgModal').classList.remove('active'); }

        async function sendNewMessage() {
            const receiver = document.getElementById('new-receiver').value.trim();
            const subject = document.getElementById('new-subject').value.trim();
            const content = document.getElementById('new-content').value.trim();
            if (!receiver || !content) { toast('Please fill in all fields.', 'warning'); return; }
            const data = await apiPost('/messages', { receiverUsername: receiver, subject, content }, true);
            if (data.error) { toast(data.error, 'error'); return; }
            toast('Message sent!', 'success');
            closeNewMsg();
            loadConversations();
        }

        function logout() { localStorage.removeItem('jc_token'); localStorage.removeItem('jc_user'); window.location.href = '/login'; }
        window.onload = loadConversations;
    </script>
</body>
</html>
