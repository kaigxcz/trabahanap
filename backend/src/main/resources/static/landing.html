<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="TrabaHanap - The fastest way to find your next job in the Philippines. Browse 20+ jobs, get matched by skills, and apply in one click.">
    <meta property="og:title" content="TrabaHanap | Find Your Next Opportunity">
    <meta property="og:description" content="Smart job matching, easy apply, and application tracking for Filipino professionals.">
    <meta property="og:type" content="website">
    <title>TrabaHanap | Find Your Next Opportunity</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .hero-bg { background: linear-gradient(135deg, #0f172a 0%, #1e3a5f 60%, #0f172a 100%); }
        .glow { box-shadow: 0 0 80px rgba(79,70,229,0.3); }
        .stat-card { background: rgba(255,255,255,0.08); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.12); }
        .feature-card { transition: all 0.25s; }
        .feature-card:hover { transform: translateY(-4px); box-shadow: 0 16px 40px rgba(0,0,0,0.1); }
        .testimonial-card { background: white; border-radius: 1.5rem; padding: 1.75rem; box-shadow: 0 4px 20px rgba(0,0,0,0.06); border: 1px solid #f1f5f9; transition: all 0.2s; }
        .testimonial-card:hover { transform: translateY(-3px); box-shadow: 0 12px 40px rgba(0,0,0,0.1); }
        .gradient-text { background: linear-gradient(135deg, #818cf8, #34d399); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        .step-num { width: 2.5rem; height: 2.5rem; background: linear-gradient(135deg, #4f46e5, #7c3aed); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-weight: 800; font-size: 0.875rem; flex-shrink: 0; }
        @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
        .float { animation: float 4s ease-in-out infinite; }
        .nav-sticky { position: sticky; top: 0; z-index: 100; background: rgba(15,23,42,0.9); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(255,255,255,0.08); }
        @keyframes countUp { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
        .counter-animated { animation: countUp 0.6s ease both; }
        /* Hamburger */
        .hamburger { display:none; flex-direction:column; gap:5px; cursor:pointer; padding:4px; }
        .hamburger span { display:block; width:22px; height:2px; background:white; border-radius:2px; transition:all 0.3s; }
        @media(max-width:768px) { .hamburger { display:flex; } .mobile-nav-menu { display:none; } .mobile-nav-menu.open { display:flex; } }
        /* FAQ accordion */
        .faq-item { border-bottom: 1px solid #f1f5f9; }
        .faq-answer { max-height: 0; overflow: hidden; transition: max-height 0.35s ease, padding 0.35s ease; }
        .faq-answer.open { max-height: 300px; }
        /* Scroll to top */
        #scroll-top { position:fixed; bottom:2rem; right:2rem; z-index:50; width:3rem; height:3rem; background:#4f46e5; color:white; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:1.25rem; cursor:pointer; box-shadow:0 4px 20px rgba(79,70,229,0.4); opacity:0; transform:translateY(20px); transition:all 0.3s; pointer-events:none; border:none; }
        #scroll-top.visible { opacity:1; transform:translateY(0); pointer-events:all; }
        #scroll-top:hover { background:#4338ca; transform:translateY(-2px); }
        /* Live counter */
        .live-counter-section { background: linear-gradient(135deg, #4f46e5, #7c3aed); }
    </style>
</head>
<body class="bg-slate-50">

    <!-- Scroll to top button -->
    <button id="scroll-top" onclick="window.scrollTo({top:0,behavior:'smooth'})" title="Back to top">↑</button>

    <!-- Navbar -->
    <nav class="nav-sticky">
        <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-9 h-9 bg-indigo-600 rounded-xl flex items-center justify-center shadow-lg shadow-indigo-900/50">
                    <span class="text-white font-black">T</span>
                </div>
                <div>
                    <span class="font-bold text-xl text-white tracking-tight block leading-tight">TrabaHanap</span>
                    <span class="text-[9px] text-indigo-300 font-medium">Online Job Application System</span>
                </div>
            </div>
            <div class="hidden md:flex items-center gap-8 text-sm text-slate-400">
                <a href="#features" class="hover:text-white transition">Features</a>
                <a href="#how-it-works" class="hover:text-white transition">How it Works</a>
                <a href="#faq" class="hover:text-white transition">FAQ</a>
                <a href="/tips" class="hover:text-white transition">Career Tips</a>
            </div>
            <div class="flex items-center gap-3">
                <a href="/login" class="text-slate-300 hover:text-white text-sm font-semibold transition px-4 py-2 hidden md:block">Sign In</a>
                <a href="/login" onclick="sessionStorage.setItem('mode','register')" class="bg-indigo-600 hover:bg-indigo-500 text-white text-sm font-bold px-5 py-2.5 rounded-xl transition shadow-lg shadow-indigo-900/40">Get Started Free</a>
                <button class="hamburger md:hidden" onclick="toggleMobileNav()" aria-label="Menu">
                    <span></span><span></span><span></span>
                </button>
            </div>
        </div>
        <!-- Mobile nav menu -->
        <div id="mobile-nav-menu" class="mobile-nav-menu flex-col gap-1 px-6 pb-4 md:hidden">
            <a href="#features" class="text-slate-300 hover:text-white py-2 text-sm font-medium transition" onclick="toggleMobileNav()">Features</a>
            <a href="#how-it-works" class="text-slate-300 hover:text-white py-2 text-sm font-medium transition" onclick="toggleMobileNav()">How it Works</a>
            <a href="#faq" class="text-slate-300 hover:text-white py-2 text-sm font-medium transition" onclick="toggleMobileNav()">FAQ</a>
            <a href="/tips" class="text-slate-300 hover:text-white py-2 text-sm font-medium transition">Career Tips</a>
            <a href="/login" class="text-slate-300 hover:text-white py-2 text-sm font-medium transition">Sign In</a>
        </div>
    </nav>
